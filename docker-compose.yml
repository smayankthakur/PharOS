version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: pharos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pharos
      POSTGRES_USER: pharos
      POSTGRES_PASSWORD: pharos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pharos-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
