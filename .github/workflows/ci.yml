name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Lockfile integrity
        run: npm run check:lock

  test_api:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pharos
          POSTGRES_USER: pharos
          POSTGRES_PASSWORD: pharos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pharos -d pharos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://pharos:pharos@localhost:5432/pharos
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: example_only_ci_jwt_value_with_min_32_chars
      SYSTEM_OWNER_KEY: example_only_ci_owner_key_with_min_32_chars
      SYSTEM_ADMIN_EMAILS: owner@shakti.test
      RATE_LIMIT_BACKEND: redis
      RATE_LIMIT_WINDOW_SEC: 60
      RATE_LIMIT_MAX: 120
      PORT: 4000
      SEED_USER_PASSWORD: example_seed_password_for_ci_only
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build shared workspace packages
        run: npm run build:shared

      - name: Run migrations
        run: npm run db:migrate

      - name: Seed test data
        run: npm run db:seed:test

      - name: Run API tests (JUnit + coverage)
        run: npm run test:api:ci

      - name: Ensure API test artifacts exist
        if: always()
        run: |
          mkdir -p apps/api/reports
          mkdir -p apps/api/coverage
          if [ ! -f apps/api/reports/api-junit.xml ]; then
            echo '<testsuites name="api"><testsuite name="missing-report" tests="0" failures="0"/></testsuites>' > apps/api/reports/api-junit.xml
          fi

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-api
          path: apps/api/reports/api-junit.xml
          if-no-files-found: warn

      - name: Upload API coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: apps/api/coverage
          if-no-files-found: warn

  test_web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_API_URL: https://example.com
      API_URL: https://example.com
      NEXT_IGNORE_INCORRECT_LOCKFILE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Web typecheck
        run: npm run typecheck --workspace @pharos/web

      - name: Web build
        run: npm run build --workspace @pharos/web

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Dependency Review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: npm audit (non-blocking)
        run: npm audit --audit-level=high || true

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Trivy filesystem scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Verify Trivy SARIF file
        if: always()
        run: |
          ls -la trivy-results.sarif || true
          if [ ! -f trivy-results.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > trivy-results.sarif
          fi

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          output-file: sbom.spdx.json
          format: spdx-json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_API_URL: https://example.com
      API_URL: https://example.com
      NEXT_IGNORE_INCORRECT_LOCKFILE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build API workspaces
        run: npm run build:api

      - name: Build web workspace
        run: npm run build:web

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-api
          path: apps/api/dist
          if-no-files-found: error

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-web
          path: apps/web/.next
          if-no-files-found: error

  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality, test_api, test_web, security, build]
    env:
      JWT_SECRET: example_only_ci_jwt_value_with_min_32_chars
      NODE_ENV: production
      RATE_LIMIT_BACKEND: redis
      TEST_REPORT_FILE: artifacts/test-results-api/api-junit.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API test report
        uses: actions/download-artifact@v4
        with:
          name: test-results-api
          path: artifacts/test-results-api

      - name: Run gates
        run: npm run gates
