name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pharos
          POSTGRES_USER: pharos
          POSTGRES_PASSWORD: pharos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pharos -d pharos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://pharos:pharos@localhost:5432/pharos
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_super_secret_for_pharos_32_chars_minimum
      SYSTEM_OWNER_KEY: ci_system_owner_key_32_chars_minimum
      SYSTEM_ADMIN_EMAILS: owner@shakti.test
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: pharos

      - name: Validate lockfile platform safety
        run: npm run check:lock
        working-directory: pharos

      - name: Run migrations
        run: npm run migrate
        working-directory: pharos

      - name: Seed database
        run: npm run seed
        working-directory: pharos

      - name: Lint
        run: npm run lint
        working-directory: pharos

      - name: Typecheck
        run: npm run typecheck
        working-directory: pharos

      - name: Test
        run: npm run test
        working-directory: pharos

      - name: Build
        run: npm run build
        working-directory: pharos
